      # - ./lighttpd.conf:/etc/lighttpd/lighttpd.conf:ro
      # - ./style.css:/usr/share/webapps/cgit/cgit.css:ro
      # - ./logo.png:/usr/share/webapps/cgit/cgit.png:ro
      # - ./favicon.ico:/usr/share/webapps/cgit/favicon.ico:ro
