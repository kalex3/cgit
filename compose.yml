services:
  cgit:
    # build: .
    # image: cgit:latest
    image: ghcr.io/kalex3/cgit:latest
    container_name: cgit
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - ./git:/srv/git:ro
      - ./README.md:/usr/share/webapps/cgit/about.md:ro
